services:
  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    labels:
      com.outpost.role: redis
    # NOT exposed on the host. proxy reaches Redis via the internal docker
    # network at redis://redis:6379. Exposing 6379 publicly is a well-known
    # attack vector — unauthenticated Redis instances on 0.0.0.0 are routinely
    # taken over within hours of provisioning. For debugging:
    #   docker compose exec redis redis-cli
    #expose: ["6379:6379"]
    volumes:
      - outpost_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 5

  proxy:
    # OUTPOST_IMPL chooses which implementation to deploy:
    #   python  → ghcr.io/sausin/outpost-python:latest (default; mature)
    #   ts      → ghcr.io/sausin/outpost-ts:latest     (Cloudflare-Workers-compatible)
    #
    # OUTPOST_IMAGE overrides the entire reference (e.g. to pin a tag or use
    # a local build). When set, OUTPOST_IMPL is ignored for image selection
    # but still drives the `build:` fallback below.
    image: ${OUTPOST_IMAGE:-ghcr.io/sausin/outpost-${OUTPOST_IMPL:-python}:latest}
    build:
      context: .
      dockerfile: ${OUTPOST_DOCKERFILE:-Dockerfile}
    restart: unless-stopped
    labels:
      com.outpost.role: proxy
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      # Override PROVIDERS_DIR if you want to use external definitions instead.
      # EXTRA_PROVIDERS_DIR: /custom-providers
    ports: ["8080:8080"]
    volumes:
      # Both config locations are mounted read-only from the host repo. Edit
      # them on disk and `docker compose restart proxy` — no image rebuild.
      # The image bakes the same files in as defaults, so a `docker run`
      # without these mounts still works.
      - ./hosts.yaml:/etc/outpost/hosts.yaml:ro
      - ./app/builtin_providers:/etc/outpost/providers:ro
      # Optional: drop additional custom provider YAMLs (loaded on top of the
      # built-ins; same `name` overrides). Useful for one-off providers you
      # don't want to PR upstream.
      # - ./my-providers:/etc/outpost/extra-providers:ro
      # And set in .env: EXTRA_PROVIDERS_DIR=/etc/outpost/extra-providers

volumes:
  outpost_redis_data:
