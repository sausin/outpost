# Host policy. Lookup is by source IP, longest-prefix CIDR match.
#
# Three knobs per host:
#   cidrs              — CIDR block(s) this entry applies to
#   can_call_sensitive — must be true to invoke endpoints flagged sensitive
#                        (writes, trades, deletes) in the provider YAML
#   auth_token_env     — OPTIONAL. When set, requests from this host must
#                        carry `X-Outpost-Auth: <token>` matching the env
#                        var's value. Use it for any internet-facing host
#                        where IP allowlisting alone isn't sufficient.
#                        Generate tokens with `openssl rand -hex 32`.
#
# Unmatched IPs get 403 PROXY_HOST_DENIED.
# Hosts with PSK + missing/wrong token get 401 PROXY_AUTH_REQUIRED.
# Hosts without `auth_token_env` skip the PSK check (handy for localhost-dev).
#
# Backward compatibility: `can_trade` is still read as an alias for
# can_call_sensitive but logs a deprecation warning.

hosts:
  - id: research-agent
    cidrs: ["10.0.1.0/24"]
    can_call_sensitive: false
    description: "Read-only research / analytics agents"
    # PRODUCTION: uncomment the next line + add RESEARCH_AGENT_TOKEN to .env
    # auth_token_env: RESEARCH_AGENT_TOKEN

  - id: backtest-runner
    cidrs: ["10.0.2.5/32", "10.0.2.6/32"]
    can_call_sensitive: false
    description: "Backtesting workers — read historical + live data only"
    # PRODUCTION: uncomment the next line + add BACKTEST_RUNNER_TOKEN to .env
    # auth_token_env: BACKTEST_RUNNER_TOKEN

  - id: execution-agent
    cidrs: ["10.0.3.10/32"]
    can_call_sensitive: true
    description: "Sole host permitted to invoke sensitive endpoints"
    # PRODUCTION: uncomment the next line + add EXECUTION_AGENT_TOKEN to .env
    # auth_token_env: EXECUTION_AGENT_TOKEN

  - id: localhost-dev
    cidrs: ["127.0.0.1/32", "::1/128"]
    can_call_sensitive: true
    description: "Local development — no PSK required"
