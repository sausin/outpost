name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  docker-python:
    name: Build & push Python image to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (Python)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/outpost-python
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=Outpost (Python)
            org.opencontainers.image.description=The edge sidecar for AI agents — Python runtime
            org.opencontainers.image.licenses=MIT

      - name: Build & push (Python)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=outpost-python
          cache-to: type=gha,mode=max,scope=outpost-python

  docker-ts:
    name: Build & push TypeScript image to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (TypeScript)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/outpost-ts
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=Outpost (TypeScript)
            org.opencontainers.image.description=The edge sidecar for AI agents — TypeScript/Node runtime
            org.opencontainers.image.licenses=MIT

      - name: Build & push (TypeScript)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: app/ts/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=outpost-ts
          cache-to: type=gha,mode=max,scope=outpost-ts

  workers:
    name: Deploy TS runtime to Cloudflare Workers
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only fires when CLOUDFLARE_API_TOKEN is configured as a repo secret.
    # Without it, this job is silently skipped — perfect for self-hosters
    # who don't use the Workers path.
    if: ${{ github.repository_owner == 'sausin' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/ts/package-lock.json

      - name: Install dependencies
        working-directory: app/ts
        run: npm ci

      - name: Deploy to Cloudflare Workers
        working-directory: app/ts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "CLOUDFLARE_API_TOKEN not set — skipping Workers deploy."
            exit 0
          fi
          npx wrangler deploy --var VERSION:${{ github.ref_name }}

  release-notes:
    name: Publish release notes
    needs: [docker-python, docker-ts]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate notes
        id: notes
        run: |
          PREV=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -1)
          if [ -z "$PREV" ]; then
            COMMITS=$(git log --oneline -20)
          else
            COMMITS=$(git log --oneline "${PREV}..HEAD")
          fi

          cat > /tmp/notes.md <<EOF
          ## Outpost ${{ github.ref_name }}

          Two runtime images this release — pick whichever matches your deploy target.

          ### Python (mature, full-feature)

          \`\`\`bash
          docker pull ghcr.io/${{ github.repository_owner }}/outpost-python:${{ github.ref_name }}
          \`\`\`

          ### TypeScript (Cloudflare-Workers-compatible, Node-deployable)

          \`\`\`bash
          docker pull ghcr.io/${{ github.repository_owner }}/outpost-ts:${{ github.ref_name }}
          \`\`\`

          Both images: \`linux/amd64\` + \`linux/arm64\`. Each also tagged \`latest\`.

          ### Install in one command (Docker)

          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/scripts/install.sh | bash
          \`\`\`

          The installer prompts whether to use the Python or TypeScript image.

          ### Commits since ${PREV:-the beginning}

          \`\`\`
          ${COMMITS}
          \`\`\`
          EOF

          echo "body=/tmp/notes.md" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Outpost ${{ github.ref_name }}"
          body_path: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: false
