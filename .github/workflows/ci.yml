name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-lint:
    name: Python — lint, format, type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dev dependencies
        run: uv sync --all-extras

      - name: Ruff check
        run: uv run ruff check app/python outpost_cli

      - name: Ruff format check
        run: uv run ruff format --check app/python outpost_cli

      - name: Pyright
        run: uv run pyright app/python outpost_cli

  ts-lint:
    name: TypeScript — typecheck, format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/ts/package-lock.json

      - name: Install dependencies
        working-directory: app/ts
        run: npm ci

      - name: Typecheck
        working-directory: app/ts
        run: npx tsc --noEmit

      - name: Prettier check
        working-directory: app/ts
        run: npx prettier --check src/

      - name: Vitest (when tests exist)
        working-directory: app/ts
        run: |
          if grep -q '"test"' package.json && [ -d src ] && find src -name "*.test.ts" -print -quit | grep -q .; then
            npx vitest run
          else
            echo "No tests yet — skipping"
          fi

  docker-python:
    name: Python image — build (verification only)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: outpost-python:ci
          cache-from: type=gha,scope=outpost-python
          cache-to: type=gha,mode=max,scope=outpost-python

      - name: Smoke-test image
        run: |
          docker run --rm --entrypoint sh outpost-python:ci -c "
            test -x /opt/venv/bin/uvicorn || exit 1
            test -d /etc/outpost/providers || exit 1
            test -f /etc/outpost/hosts.yaml || exit 1
            id | grep -q 'uid=10001' || exit 1
            echo 'python image OK'
          "

  docker-ts:
    name: TypeScript image — build (verification only)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: app/ts/Dockerfile
          push: false
          load: true
          tags: outpost-ts:ci
          cache-from: type=gha,scope=outpost-ts
          cache-to: type=gha,mode=max,scope=outpost-ts

      - name: Smoke-test image
        run: |
          docker run --rm --entrypoint sh outpost-ts:ci -c "
            test -f /app/dist/node.js || exit 1
            test -d /etc/outpost/providers || exit 1
            test -f /etc/outpost/hosts.yaml || exit 1
            id | grep -q 'uid=10001' || exit 1
            echo 'ts image OK'
          "
