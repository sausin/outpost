name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint, format, type-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dev dependencies
        run: uv sync --all-extras

      - name: Ruff check
        run: uv run ruff check app/ outpost_cli/

      - name: Ruff format check
        run: uv run ruff format --check app/ outpost_cli/

      - name: Pyright
        run: uv run pyright app/ outpost_cli/

  docker-build:
    name: Docker build (verification only)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: outpost:ci
          cache-from: type=gha,scope=outpost
          cache-to: type=gha,mode=max,scope=outpost

      - name: Smoke-test image
        run: |
          docker run --rm --entrypoint sh outpost:ci -c "
            test -x /opt/venv/bin/uvicorn || exit 1
            test -d /app/app/builtin_providers || exit 1
            id | grep -q 'uid=10001' || exit 1
            echo 'image OK'
          "
