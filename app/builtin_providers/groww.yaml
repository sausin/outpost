name: groww
base_url: https://api.groww.in
description: "Groww Trading API — Indian stockbroker REST API"
docs_url: https://groww.in/trade-api/docs

enabled: true

default_headers:
  X-API-VERSION: "1.0"
  Accept: application/json

# ─── Authentication ────────────────────────────────────────────────────
# Groww supports three auth flows. Pick the one matching the credentials
# you generated on the Groww Cloud API Keys dashboard. ONLY ONE `auth:`
# block should be uncommented at a time.
#
# Flows #2 and #3 both require you to click "Approve" on the Groww dashboard
# ONCE PER DAY. After that, the plugin auto-mints tokens for the rest of the
# day without further interaction.

# ── Flow 2 (DEFAULT): API key + secret checksum ────────────────────────
# Set GROWW_API_KEY and GROWW_API_SECRET in .env, then `docker compose up`.
auth:
  type: plugin
  module: app.python.plugins.groww_approval_mint:GrowwApprovalMintAuth
  module_ts: plugins/groww_approval_mint.ts:GrowwApprovalMintAuth
  config:
    api_key_env: GROWW_API_KEY
    api_secret_env: GROWW_API_SECRET
    mint_path: /v1/token/api/access
    invalidate_on: [401]

# ── Flow 3 (ALTERNATIVE): API key + TOTP authenticator ─────────────────
# Best for fully unattended automation. Requires you to scan the Groww TOTP
# QR into an authenticator app and put the base32 seed in GROWW_TOTP_SEED.
# auth:
#   type: plugin
#   module: app.python.plugins.groww_totp_mint:GrowwTotpMintAuth
#   module_ts: plugins/groww_totp_mint.ts:GrowwTotpMintAuth
#   config:
#     api_key_env: GROWW_API_KEY
#     totp_seed_env: GROWW_TOTP_SEED
#     mint_path: /v1/token/api/access
#     invalidate_on: [401]

# ── Flow 1 (MANUAL): operator pastes a daily access token ──────────────
# Generate the token from the Groww dashboard each day and either set
# GROWW_ACCESS_TOKEN in .env (restart required) or `SET groww:token <value>`
# in Redis (no restart). No plugin needed for this flow.
# auth:
#   type: bearer_redis
#   redis_key: groww:token
#   env_seed: GROWW_ACCESS_TOKEN
#   header: Authorization
#   prefix: "Bearer "
#   invalidate_on: [401]

forwarding:
  mode: allowlist
  allow:
    # ─── Orders — writes (sensitive) ─────────────────────────────────────
    - {method: POST,   pattern: "/v1/order/create",   category: orders, sensitive: true}
    - {method: POST,   pattern: "/v1/order/modify",   category: orders, sensitive: true}
    - {method: POST,   pattern: "/v1/order/cancel",   category: orders, sensitive: true}

    # ─── Smart orders (GTT / OCO) — writes (sensitive) ───────────────────
    # Real path is /v1/order-advance/* per the docs; the old "/v1/smart-order"
    # paths we used to allow do not exist on the upstream.
    - {method: POST,   pattern: "/v1/order-advance/create",      category: orders, sensitive: true}
    - {method: PUT,    pattern: "/v1/order-advance/modify/**",   category: orders, sensitive: true}
    - {method: POST,   pattern: "/v1/order-advance/cancel/**",   category: orders, sensitive: true}

    # ─── Orders — reads ──────────────────────────────────────────────────
    # detail / status / trades all carry {groww_order_id} as a path param
    # (status/reference uses an operator-supplied order_reference_id).
    - {method: GET,    pattern: "/v1/order/detail/**",           category: non_trading, cache_ttl: 2}
    - {method: GET,    pattern: "/v1/order/status/reference/**", category: non_trading, cache_ttl: 2}
    - {method: GET,    pattern: "/v1/order/status/**",           category: non_trading, cache_ttl: 2}
    - {method: GET,    pattern: "/v1/order/trades/**",           category: non_trading, cache_ttl: 2}
    - {method: GET,    pattern: "/v1/order/list",                category: non_trading, cache_ttl: 2}

    # Smart-order reads
    - {method: GET,    pattern: "/v1/order-advance/status/**",   category: non_trading, cache_ttl: 2}
    - {method: GET,    pattern: "/v1/order-advance/list",        category: non_trading, cache_ttl: 2}

    # ─── Live market data ────────────────────────────────────────────────
    - {method: GET,    pattern: "/v1/live-data/quote",  category: live_data, cache_ttl: 1}
    - {method: GET,    pattern: "/v1/live-data/ltp",    category: live_data, cache_ttl: 1}
    - {method: GET,    pattern: "/v1/live-data/ohlc",   category: live_data, cache_ttl: 2}
    - {method: GET,    pattern: "/v1/live-data/greeks/**", category: live_data, cache_ttl: 2}
    - {method: GET,    pattern: "/v1/option-chain/**",  category: live_data, cache_ttl: 1}

    # ─── Portfolio ───────────────────────────────────────────────────────
    - {method: GET,    pattern: "/v1/holdings/user",             category: non_trading, cache_ttl: 5}
    - {method: GET,    pattern: "/v1/positions/user",            category: non_trading, cache_ttl: 5}
    - {method: GET,    pattern: "/v1/positions/trading-symbol",  category: non_trading, cache_ttl: 5}

    # ─── Margin / funds ──────────────────────────────────────────────────
    # GET fetches available margin; POST calculates required margin for an
    # order plan WITHOUT placing it — not sensitive.
    - {method: GET,    pattern: "/v1/margins/detail/user",       category: non_trading, cache_ttl: 5}
    - {method: POST,   pattern: "/v1/margins/detail/orders",     category: non_trading, cache_ttl: 0}

    # ─── Historical (backtesting) ────────────────────────────────────────
    - {method: GET,    pattern: "/v1/historical/expiries",       category: non_trading, cache_ttl: 86400}
    - {method: GET,    pattern: "/v1/historical/contracts",      category: non_trading, cache_ttl: 86400}
    - {method: GET,    pattern: "/v1/historical/candles",        category: non_trading, cache_ttl: 300}
    # Deprecated by Groww — kept for back-compat until clients migrate.
    - {method: GET,    pattern: "/v1/historical/candle/range",   category: non_trading, cache_ttl: 300}

    # ─── User profile ────────────────────────────────────────────────────
    - {method: GET,    pattern: "/v1/user/detail",               category: non_trading, cache_ttl: 60}

  # NOTE: the Groww instruments master is at
  #   https://growwapi-assets.groww.in/instruments/instrument.csv
  # which is a DIFFERENT host. It can't be served through this provider
  # (base_url is api.groww.in). For instruments, agents fetch that URL
  # directly — no auth required, just a plain GET.

  rate_limits:
    orders:      [{capacity: 10, window_ms: 1000}, {capacity: 250, window_ms: 60000}]
    live_data:   [{capacity: 10, window_ms: 1000}, {capacity: 300, window_ms: 60000}]
    non_trading: [{capacity: 20, window_ms: 1000}, {capacity: 500, window_ms: 60000}]
